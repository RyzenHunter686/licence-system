services:
  - type: web
    name: hunter-license-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker bot_web:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: TELEGRAM_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
